<svg width="820" height="180" viewBox="0 0 820 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pranav — backend and distributed systems">
  <!-- Tokyo Night dark variant · accent #7aa2f7 -->

  <!-- Name -->
  <text x="410" y="72" text-anchor="middle"
        font-family="'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif"
        font-size="44" font-weight="700" letter-spacing="6"
        fill="#c0caf5">PRANAV</text>

  <!-- Blinking cursor after the name -->
  <rect x="532" y="38" width="4" height="40" fill="#7aa2f7">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Role line -->
  <text x="410" y="104" text-anchor="middle"
        font-family="'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif"
        font-size="15" font-weight="400" letter-spacing="3"
        fill="#565f89">BACKEND&#160;&#160;·&#160;&#160;DISTRIBUTED&#160;SYSTEMS&#160;&#160;·&#160;&#160;JAVA</text>

  <!-- Animated waveform: pattern repeats every 240px, translated one period per loop -->
  <g clip-path="url(#clip)">
    <g>
      <path d="M -240 150
               Q -210 130 -180 150 T -120 150 T -60 150 T 0 150
               T 60 150 T 120 150 T 180 150 T 240 150
               T 300 150 T 360 150 T 420 150 T 480 150
               T 540 150 T 600 150 T 660 150 T 720 150
               T 780 150 T 840 150 T 900 150 T 960 150 T 1020 150 T 1080 150"
            stroke="#7aa2f7" stroke-width="2" stroke-linecap="round" opacity="0.85" fill="none"/>
      <path d="M -240 152
               Q -200 174 -160 152 T -80 152 T 0 152
               T 80 152 T 160 152 T 240 152
               T 320 152 T 400 152 T 480 152
               T 560 152 T 640 152 T 720 152
               T 800 152 T 880 152 T 960 152 T 1040 152 T 1120 152"
            stroke="#3d59a1" stroke-width="1.5" stroke-linecap="round" opacity="0.5" fill="none"/>
      <animateTransform attributeName="transform" type="translate"
                        from="0 0" to="240 0" dur="7s" repeatCount="indefinite"/>
    </g>
  </g>

  <defs>
    <clipPath id="clip">
      <rect x="0" y="120" width="820" height="60"/>
    </clipPath>
  </defs>
</svg>
